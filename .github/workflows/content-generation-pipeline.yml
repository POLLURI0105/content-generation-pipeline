name: Content Generation Pipeline

on:
  schedule:
    # Runs every alternate day starting from Monday (Mon, Wed, Fri, Sun)
    - cron: '0 9 * * 1,3,5,0'
  workflow_dispatch: # Allow manual trigger

env:
  RETRY_ATTEMPTS: 3
  RETRY_DELAY: 30

jobs:
  # Step 1: Load Ideas from Repository
  load-ideas:
    name: Load Ideas
    runs-on: ubuntu-latest
    outputs:
      ideas: ${{ steps.load.outputs.ideas }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Load weekly ideas
        id: load
        run: |
          if [ -f "ideas/weekly_ideas.json" ]; then
            IDEAS=$(cat ideas/weekly_ideas.json)
            echo "ideas=$IDEAS" >> $GITHUB_OUTPUT
          else
            echo "Error: weekly_ideas.json not found"
            exit 1
          fi

  # Step 2: Generate Scripts using Claude API
  generate-scripts:
    name: Generate Scripts with Claude
    runs-on: ubuntu-latest
    needs: load-ideas
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install requests python-dotenv anthropic
      
      - name: Generate scripts from Claude
        id: scripts
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          CLAUDE_PROJECT_ID: ${{ secrets.CLAUDE_PROJECT_ID }}
        run: |
          python scripts/claude_script_generator.py
        continue-on-error: true
      
      - name: Retry on failure
        if: failure()
        run: |
          for i in {1..${RETRY_ATTEMPTS}}; do
            echo "Attempt $i/${RETRY_ATTEMPTS}"
            sleep ${RETRY_DELAY}
            python scripts/claude_script_generator.py && exit 0
          done
          exit 1
      
      - name: Upload scripts artifact
        uses: actions/upload-artifact@v3
        with:
          name: generated-scripts
          path: output/scripts.json

  # Step 3: Generate Voice with ElevenLabs v3 (Punctuation-based Emotions)
  voice-cloning:
    name: Voice Cloning with ElevenLabs v3 (Emotion-based)
    runs-on: ubuntu-latest
    needs: generate-scripts
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install requests python-dotenv elevenlabs
      
      - name: Download scripts artifact
        uses: actions/download-artifact@v3
        with:
          name: generated-scripts
          path: output/
      
      - name: Generate voice with ElevenLabs v3 (Punctuation-based Emotions)
        id: voice
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
          ELEVENLABS_MODEL_ID: eleven_multilingual_v2
        run: |
          python scripts/elevenlabs_voice_generator.py
        continue-on-error: true
      
      - name: Retry on failure
        if: failure()
        run: |
          for i in {1..${RETRY_ATTEMPTS}}; do
            echo "Attempt $i/${RETRY_ATTEMPTS}"
            sleep ${RETRY_DELAY}
            python scripts/elevenlabs_voice_generator.py && exit 0
          done
          exit 1
      
      - name: Upload voice artifact
        uses: actions/upload-artifact@v3
        with:
          name: generated-voice
          path: output/voice_metadata.json

  # Step 4: Generate AI Video Clips
  generate-video-clips:
    name: Generate Video Clips (Kling 3.0 + Veo 3.1)
    runs-on: ubuntu-latest
    needs: generate-scripts
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install requests python-dotenv
      
      - name: Download scripts artifact
        uses: actions/download-artifact@v3
        with:
          name: generated-scripts
          path: output/
      
      - name: Generate video with Kling 3.0
        id: kling
        env:
          KLING_API_KEY: ${{ secrets.KLING_API_KEY }}
        run: |
          python scripts/kling_video_generator.py
        continue-on-error: true
      
      - name: Retry Kling on failure
        if: failure()
        run: |
          for i in {1..${RETRY_ATTEMPTS}}; do
            echo "Attempt $i/${RETRY_ATTEMPTS}"
            sleep ${RETRY_DELAY}
            python scripts/kling_video_generator.py && exit 0
          done
          exit 1
      
      - name: Generate hero shots with Veo 3.1
        id: veo
        env:
          VEO_API_KEY: ${{ secrets.VEO_API_KEY }}
        run: |
          python scripts/veo_hero_shots_generator.py
        continue-on-error: true
      
      - name: Retry Veo on failure
        if: failure()
        run: |
          for i in {1..${RETRY_ATTEMPTS}}; do
            echo "Attempt $i/${RETRY_ATTEMPTS}"
            sleep ${RETRY_DELAY}
            python scripts/veo_hero_shots_generator.py && exit 0
          done
          exit 1
      
      - name: Upload video clips artifact
        uses: actions/upload-artifact@v3
        with:
          name: generated-videos
          path: output/kling_videos_metadata.json

  # Step 5: Generate AI Images/Stills
  generate-images:
    name: Generate Images (Ideogram 3.0 + Midjourney v7)
    runs-on: ubuntu-latest
    needs: generate-scripts
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install requests python-dotenv
      
      - name: Download scripts artifact
        uses: actions/download-artifact@v3
        with:
          name: generated-scripts
          path: output/
      
      - name: Generate images with Ideogram 3.0
        id: ideogram
        env:
          IDEOGRAM_API_KEY: ${{ secrets.IDEOGRAM_API_KEY }}
        run: |
          python scripts/ideogram_image_generator.py
        continue-on-error: true
      
      - name: Retry Ideogram on failure
        if: failure()
        run: |
          for i in {1..${RETRY_ATTEMPTS}}; do
            echo "Attempt $i/${RETRY_ATTEMPTS}"
            sleep ${RETRY_DELAY}
            python scripts/ideogram_image_generator.py && exit 0
          done
          exit 1
      
      - name: Generate images with Midjourney v7
        id: midjourney
        env:
          MIDJOURNEY_API_KEY: ${{ secrets.MIDJOURNEY_API_KEY }}
        run: |
          python scripts/midjourney_image_generator.py
        continue-on-error: true
      
      - name: Retry Midjourney on failure
        if: failure()
        run: |
          for i in {1..${RETRY_ATTEMPTS}}; do
            echo "Attempt $i/${RETRY_ATTEMPTS}"
            sleep ${RETRY_DELAY}
            python scripts/midjourney_image_generator.py && exit 0
          done
          exit 1
      
      - name: Upload images artifact
        uses: actions/upload-artifact@v3
        with:
          name: generated-images
          path: output/ideogram_images_metadata.json

  # Step 6: Fetch Stock B-rolls
  fetch-stock-footage:
    name: Fetch Stock B-rolls (Pexels + Pixabay)
    runs-on: ubuntu-latest
    needs: generate-scripts
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install requests python-dotenv
      
      - name: Download scripts artifact
        uses: actions/download-artifact@v3
        with:
          name: generated-scripts
          path: output/
      
      - name: Fetch from Pexels
        id: pexels
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: |
          python scripts/pexels_fetcher.py
        continue-on-error: true
      
      - name: Retry Pexels on failure
        if: failure()
        run: |
          for i in {1..${RETRY_ATTEMPTS}}; do
            echo "Attempt $i/${RETRY_ATTEMPTS}"
            sleep ${RETRY_DELAY}
            python scripts/pexels_fetcher.py && exit 0
          done
          exit 1
      
      - name: Fetch from Pixabay
        id: pixabay
        env:
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
        run: |
          python scripts/pixabay_fetcher.py
        continue-on-error: true
      
      - name: Retry Pixabay on failure
        if: failure()
        run: |
          for i in {1..${RETRY_ATTEMPTS}}; do
            echo "Attempt $i/${RETRY_ATTEMPTS}"
            sleep ${RETRY_DELAY}
            python scripts/pixabay_fetcher.py && exit 0
          done
          exit 1
      
      - name: Upload stock footage artifact
        uses: actions/upload-artifact@v3
        with:
          name: stock-footage
          path: output/pexels_metadata.json

  # Step 7: Generate SFX and Captions
  generate-sfx-captions:
    name: Generate SFX & Captions
    runs-on: ubuntu-latest
    needs: voice-cloning
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install requests python-dotenv pysrt
      
      - name: Download voice artifact
        uses: actions/download-artifact@v3
        with:
          name: generated-voice
          path: output/
      
      - name: Generate SFX with ElevenLabs
        id: sfx_elevenlabs
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
        run: |
          python scripts/elevenlabs_sfx_generator.py
        continue-on-error: true
      
      - name: Retry ElevenLabs SFX on failure
        if: failure()
        run: |
          for i in {1..${RETRY_ATTEMPTS}}; do
            echo "Attempt $i/${RETRY_ATTEMPTS}"
            sleep ${RETRY_DELAY}
            python scripts/elevenlabs_sfx_generator.py && exit 0
          done
          exit 1
      
      - name: Fetch SFX from Pixabay
        id: sfx_pixabay
        env:
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
        run: |
          python scripts/pixabay_sfx_fetcher.py
        continue-on-error: true
      
      - name: Retry Pixabay SFX on failure
        if: failure()
        run: |
          for i in {1..${RETRY_ATTEMPTS}}; do
            echo "Attempt $i/${RETRY_ATTEMPTS}"
            sleep ${RETRY_DELAY}
            python scripts/pixabay_sfx_fetcher.py && exit 0
          done
          exit 1
      
      - name: Generate Captions from Voice
        id: captions
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
        run: |
          python scripts/caption_generator.py
        continue-on-error: true
      
      - name: Retry Captions on failure
        if: failure()
        run: |
          for i in {1..${RETRY_ATTEMPTS}}; do
            echo "Attempt $i/${RETRY_ATTEMPTS}"
            sleep ${RETRY_DELAY}
            python scripts/caption_generator.py && exit 0
          done
          exit 1
      
      - name: Upload SFX and Captions artifact
        uses: actions/upload-artifact@v3
        with:
          name: sfx-captions
          path: output/elevenlabs_sfx_metadata.json

  # Step 8: Generate Thumbnails
  generate-thumbnails:
    name: Generate Thumbnails (Ideogram + Canva)
    runs-on: ubuntu-latest
    needs: generate-images
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install requests python-dotenv pillow
      
      - name: Download images artifact
        uses: actions/download-artifact@v3
        with:
          name: generated-images
          path: output/
      
      - name: Generate thumbnails with Ideogram
        id: ideogram_thumb
        env:
          IDEOGRAM_API_KEY: ${{ secrets.IDEOGRAM_API_KEY }}
        run: |
          python scripts/ideogram_thumbnail_generator.py
        continue-on-error: true
      
      - name: Retry Ideogram Thumbnails on failure
        if: failure()
        run: |
          for i in {1..${RETRY_ATTEMPTS}}; do
            echo "Attempt $i/${RETRY_ATTEMPTS}"
            sleep ${RETRY_DELAY}
            python scripts/ideogram_thumbnail_generator.py && exit 0
          done
          exit 1
      
      - name: Generate thumbnails with Canva
        id: canva_thumb
        env:
          CANVA_API_KEY: ${{ secrets.CANVA_API_KEY }}
        run: |
          python scripts/canva_thumbnail_generator.py
        continue-on-error: true
      
      - name: Retry Canva Thumbnails on failure
        if: failure()
        run: |
          for i in {1..${RETRY_ATTEMPTS}}; do
            echo "Attempt $i/${RETRY_ATTEMPTS}"
            sleep ${RETRY_DELAY}
            python scripts/canva_thumbnail_generator.py && exit 0
          done
          exit 1
      
      - name: Upload thumbnails artifact
        uses: actions/upload-artifact@v3
        with:
          name: thumbnails
          path: output/ideogram_thumbnails_metadata.json

  # Step 9: Final Video Editing & Assembly
  final-editing:
    name: Final Editing with CapCut
    runs-on: ubuntu-latest
    needs: [generate-video-clips, generate-images, fetch-stock-footage, generate-sfx-captions, generate-thumbnails]
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install requests python-dotenv moviepy
      
      - name: Download all artifacts
        uses: actions/download-artifact@v3
        with:
          path: artifacts/
      
      - name: Assemble and edit with CapCut
        id: capcut
        env:
          CAPCUT_API_KEY: ${{ secrets.CAPCUT_API_KEY }}
        run: |
          python scripts/capcut_editor.py
        continue-on-error: true
      
      - name: Retry CapCut editing on failure
        if: failure()
        run: |
          for i in {1..${RETRY_ATTEMPTS}}; do
            echo "Attempt $i/${RETRY_ATTEMPTS}"
            sleep ${RETRY_DELAY}
            python scripts/capcut_editor.py && exit 0
          done
          exit 1
      
      - name: Upload final video artifact
        uses: actions/upload-artifact@v3
        with:
          name: final-content
          path: output/final_videos/

  # Step 10: Send Approval Request Email
  approval-gate:
    name: Request Deployment Approval
    runs-on: ubuntu-latest
    needs: final-editing
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install requests
      
      - name: Send approval request email
        env:
          APPROVAL_EMAIL: ${{ secrets.APPROVAL_EMAIL }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          python -c "
          import smtplib
          from email.mime.text import MIMEText
          from email.mime.multipart import MIMEMultipart
          import os
          
          sender_email = os.getenv('SMTP_EMAIL')
          sender_password = os.getenv('SMTP_PASSWORD')
          receiver_email = os.getenv('APPROVAL_EMAIL')
          
          subject = '🎬 Content Generation Pipeline - Deployment Approval Required'
          
          run_url = f\"{os.getenv('GITHUB_SERVER_URL')}/{os.getenv('GITHUB_REPOSITORY')}/actions/runs/{os.getenv('GITHUB_RUN_ID')}\"
          
          body = f'''
          <html>
            <body style=\"font-family: Arial, sans-serif;\">
              <h2>Content Generation Pipeline - Approval Required</h2>
              <p>Your content has been successfully generated and is ready for deployment!</p>
              
              <h3>Pipeline Status:</h3>
              <ul>
                <li>✅ Scripts Generated</li>
                <li>✅ Voice Cloned (ElevenLabs v3 - Emotion-based)</li>
                <li>✅ Videos Generated</li>
                <li>✅ Images Generated</li>
                <li>✅ Stock Footage Fetched</li>
                <li>✅ SFX & Captions Generated</li>
                <li>✅ Thumbnails Generated</li>
                <li>✅ Final Editing Complete</li>
              </ul>
              
              <h3>Action Required:</h3>
              <p>Please review the generated content and approve the deployment to YouTube and Instagram.</p>
              
              <p style=\"margin: 20px 0;\">
                <a href=\"{run_url}\" style=\"background-color: #28a745; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; display: inline-block;\">
                  Review Pipeline & Approve
                </a>
              </p>
              
              <p><strong>Note:</strong> The deployment jobs are waiting for your approval. Click the link above to proceed with deployment or cancel if needed.</p>
              
              <hr>
              <p style=\"color: #666; font-size: 12px;\">This is an automated message from your Content Generation Pipeline.</p>
            </body>
          </html>
          '''
          
          try:
              message = MIMEMultipart('alternative')
              message['Subject'] = subject
              message['From'] = sender_email
              message['To'] = receiver_email
              
              message.attach(MIMEText(body, 'html'))
              
              server = smtplib.SMTP_SSL('smtp.gmail.com', 465)
              server.login(sender_email, sender_password)
              server.sendmail(sender_email, receiver_email, message.as_string())
              server.quit()
              
              print('✅ Approval request email sent successfully!')
          except Exception as e:
              print(f'❌ Failed to send email: {str(e)}')
              exit(1)
          "
        env:
          SMTP_EMAIL: ${{ secrets.SMTP_EMAIL }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      
      - name: Pause for manual approval
        run: |
          echo "⏸️  Waiting for approval..."
          echo "Check your email at: ${{ secrets.APPROVAL_EMAIL }}"
          echo "Pipeline paused. Run deployment jobs manually after approval."

  # Step 11: Deploy to YouTube Shorts
  deploy-youtube:
    name: Deploy to YouTube Shorts
    runs-on: ubuntu-latest
    needs: approval-gate
    environment:
      name: production-youtube
      url: https://www.youtube.com/
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install google-auth-oauthlib google-auth-httplib2 google-api-python-client
      
      - name: Download final videos artifact
        uses: actions/download-artifact@v3
        with:
          name: final-content
          path: output/
      
      - name: Deploy to YouTube Shorts
        id: youtube
        env:
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
          YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}
        run: |
          python scripts/youtube_uploader.py
        continue-on-error: true
      
      - name: Retry YouTube upload on failure
        if: failure()
        run: |
          for i in {1..${RETRY_ATTEMPTS}}; do
            echo "Attempt $i/${RETRY_ATTEMPTS}"
            sleep ${RETRY_DELAY}
            python scripts/youtube_uploader.py && exit 0
          done
          exit 1

  # Step 12: Deploy to Instagram Reels
  deploy-instagram:
    name: Deploy to Instagram Reels
    runs-on: ubuntu-latest
    needs: approval-gate
    environment:
      name: production-instagram
      url: https://www.instagram.com/
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install instagrapi requests python-dotenv
      
      - name: Download final videos artifact
        uses: actions/download-artifact@v3
        with:
          name: final-content
          path: output/
      
      - name: Deploy to Instagram Reels
        id: instagram
        env:
          INSTAGRAM_USERNAME: ${{ secrets.INSTAGRAM_USERNAME }}
          INSTAGRAM_PASSWORD: ${{ secrets.INSTAGRAM_PASSWORD }}
        run: |
          python scripts/instagram_uploader.py
        continue-on-error: true
      
      - name: Retry Instagram upload on failure
        if: failure()
        run: |
          for i in {1..${RETRY_ATTEMPTS}}; do
            echo "Attempt $i/${RETRY_ATTEMPTS}"
            sleep ${RETRY_DELAY}
            python scripts/instagram_uploader.py && exit 0
          done
          exit 1

  # Step 13: Notification on Success/Failure
  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: [deploy-youtube, deploy-instagram]
    if: always()
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install requests
      
      - name: Check job status and notify
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          EMAIL_NOTIFICATION: ${{ secrets.NOTIFICATION_EMAIL }}
        run: |
          python scripts/notification_handler.py
          
      - name: Fail job if any step failed
        if: needs.deploy-youtube.result == 'failure' || needs.deploy-instagram.result == 'failure'
        run: |
          echo "Deployment failed. Check logs above."
          exit 1
